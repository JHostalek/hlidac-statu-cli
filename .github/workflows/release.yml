name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      create_tag: ${{ steps.version.outputs.create_tag }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release state
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            if [ "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA" ]; then
              echo "release=true" >> "$GITHUB_OUTPUT"
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
            else
              echo "release=false" >> "$GITHUB_OUTPUT"
              echo "Tag $TAG belongs to an earlier commit; bump package.json version to release"
            fi
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.version.outputs.release == 'true'
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        if: steps.version.outputs.release == 'true'
        run: bun ci

      - name: Quality gates
        if: steps.version.outputs.release == 'true'
        run: |
          bun run openapi:validate
          bun run lint
          bun run typecheck
          bun test
          bun audit

      - name: Build release artifacts
        if: steps.version.outputs.release == 'true'
        run: |
          bun run build:all
          bun run build:npm
          bun run smoke:node
          sha256sum dist/hs-linux-x64 dist/hs-linux-arm64 dist/hs-darwin-x64 dist/hs-darwin-arm64 dist/hs-windows-x64.exe > dist/SHA256SUMS.txt

      - name: Attest release artifacts
        if: steps.version.outputs.release == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/hs-linux-x64
            dist/hs-linux-arm64
            dist/hs-darwin-x64
            dist/hs-darwin-arm64
            dist/hs-windows-x64.exe
            dist/SHA256SUMS.txt

      - name: Preserve release artifacts
        if: steps.version.outputs.release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/hs-linux-x64
            dist/hs-linux-arm64
            dist/hs-darwin-x64
            dist/hs-darwin-arm64
            dist/hs-windows-x64.exe
            dist/SHA256SUMS.txt

  release:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Create and push tag
        if: needs.prepare.outputs.create_tag == 'true'
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/hs-linux-x64
            dist/hs-linux-arm64
            dist/hs-darwin-x64
            dist/hs-darwin-arm64
            dist/hs-windows-x64.exe
            dist/SHA256SUMS.txt
