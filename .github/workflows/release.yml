name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Resolve release state
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(bun scripts/release.ts version)"
          TAG="v${VERSION}"
          ARTIFACT="$(bun scripts/release.ts artifact)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            if [ "$(git rev-list -n 1 "$TAG")" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG belongs to an earlier commit; bump package.json version to release" >&2
              exit 1
            fi
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install locked dependencies
        if: steps.release.outputs.publish == 'true'
        run: bun ci

      - name: Quality gates
        if: steps.release.outputs.publish == 'true'
        run: |
          bun run openapi:validate
          bun run check
          bun run test

      - name: Package macOS ARM64 release
        if: steps.release.outputs.publish == 'true'
        run: |
          test "$(uname -m)" = "arm64"
          bun run release:package
          bun run release:verify
          tar -czf dist/hlidac-statu-skill.tar.gz -C skills hlidac-statu
          (cd dist && shasum -a 256 hlidac-statu-skill.tar.gz > hlidac-statu-skill.tar.gz.sha256)

      - name: Attest release archive
        if: steps.release.outputs.publish == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/${{ steps.release.outputs.artifact }}
            dist/hlidac-statu-skill.tar.gz

      - name: Create and push tag
        if: steps.release.outputs.publish == 'true' && steps.release.outputs.create_tag == 'true'
        run: |
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          ARTIFACT: ${{ steps.release.outputs.artifact }}
        run: |
          gh release create "$TAG" \
            "dist/$ARTIFACT" \
            "dist/$ARTIFACT.sha256" \
            "dist/hlidac-statu-skill.tar.gz" \
            "dist/hlidac-statu-skill.tar.gz.sha256" \
            --verify-tag \
            --generate-notes \
            --title "$TAG"

      - name: Dispatch Homebrew update
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh workflow run update-formula.yml \
            --repo JHostalek/homebrew-tap \
            -f formula=hs \
            -f tag="$TAG" \
            -f repository=JHostalek/hlidac-statu-cli
